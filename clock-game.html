<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Learning Game</title>
    <!-- 添加童趣字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: 'Comic Neue', cursive, Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 5px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }
        body {
            font-family: 'Comic Neue', cursive, Arial, sans-serif;
            text-align: center;
            margin: 10px;
            padding: 10px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            box-sizing: border-box;
        }
        * {
            box-sizing: border-box;
        }
        h1 {
            font-size: clamp(1.2rem, 4vw, 2rem);
            color: #ff6b6b;
            text-shadow: 2px 2px 0 #ffd166;
            margin: 5px 0 8px 0;
            letter-spacing: 1px;
            word-wrap: break-word;
            flex-shrink: 0;
        }
        .difficulty-badge {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: white;
            font-weight: bold;
            padding: 6px 15px;
            border-radius: 20px;
            margin: 5px;
            display: inline-block;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        .difficulty-badge.beginner {
            background: linear-gradient(145deg, #4ecdc4, #36b7ae);
        }
        .difficulty-badge.advanced {
            background: linear-gradient(145deg, #ff6b6b, #ff5252);
        }
        .clock-container {
            width: min(340px, 75vw);
            height: min(340px, 75vw);
            margin: 15px auto;
            position: relative;
            border: min(15px, 4vw) solid #ff9a76;
            border-radius: 50%;
            background: linear-gradient(45deg, #fff5e6, #ffe8cc);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }
        .hand {
            position: absolute;
            transform-origin: bottom center;
            left: 50%;
            bottom: 50%;
            transform: translateX(-50%);
            background-color: #333;
        }
        .hour-hand {
            width: min(8px, 2.5vw);
            height: min(80px, 25vw);
            border-radius: 4px;
            background-color: #ff6b6b;
        }
        .minute-hand {
            width: min(6px, 2vw);
            height: min(120px, 35vw);
            border-radius: 3px;
            background-color: #4ecdc4;
        }
        .center-circle {
            position: absolute;
            width: min(20px, 6vw);
            height: min(20px, 6vw);
            background-color: #ffd166;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            border: min(3px, 1vw) solid #ff9a76;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 15px auto;
            max-width: 600px;
            padding: 0 10px;
            flex-shrink: 0;
        }
        .input-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 10px auto;
            max-width: 800px;
            padding: 0 10px;
            flex-shrink: 0;
            align-items: flex-start;
        }
        .input-display {
            background: white;
            padding: clamp(15px, 4vw, 20px);
            border-radius: 15px;
            margin: 10px auto;
            max-width: 400px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            flex-shrink: 0;
            flex: 1;
            min-width: 280px;
        }
        .input-text {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            color: #333;
            font-weight: bold;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .advanced-mode-wrapper {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 20px;
            justify-content: center;
            margin: 10px auto;
            max-width: 900px;
        }
        .input-text span {
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 8px;
            min-width: 35px;
            display: inline-block;
        }
        .input-text span.no-bg {
            background: transparent;
            padding: 5px 0;
            min-width: auto;
        }
        .input-text span.empty {
            background: #e0e0e0;
            color: #999;
        }
        .numpad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-width: 280px;
            margin: 10px 0;
            flex-shrink: 0;
        }
        .numpad-container {
            background: white;
            padding: clamp(15px, 4vw, 20px);
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .num-btn {
            padding: clamp(12px, 4vw, 18px);
            background: linear-gradient(145deg, #a8e6cf, #8dd7b9);
            color: #333;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: clamp(1.2rem, 4vw, 1.6rem);
            font-weight: bold;
            box-shadow: 0 4px 0 #6bc5a3;
            transition: all 0.2s ease;
        }
        .num-btn:hover {
            background: linear-gradient(145deg, #8dd7b9, #7bc9a9);
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #6bc5a3;
        }
        .num-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 0 #6bc5a3;
        }
        .num-btn.clear {
            background: linear-gradient(145deg, #ff8ba0, #ff6b6b);
            box-shadow: 0 4px 0 #e05555;
        }
        .num-btn.clear:hover {
            background: linear-gradient(145deg, #ff6b6b, #e05555);
            box-shadow: 0 6px 0 #e05555;
        }
        .num-btn.submit {
            background: linear-gradient(145deg, #4ecdc4, #36b7ae);
            box-shadow: 0 4px 0 #2a9d8f;
        }
        .num-btn.submit:hover {
            background: linear-gradient(145deg, #36b7ae, #2a9d8f);
            box-shadow: 0 6px 0 #2a9d8f;
        }
        .format-indicator {
            background: linear-gradient(145deg, #ffd166, #ffc145);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            font-weight: bold;
            color: #333;
            margin: 10px;
            display: inline-block;
            box-shadow: 0 3px 0 #e0b14d;
        }
        .format-indicator.digital {
            background: linear-gradient(145deg, #4ecdc4, #36b7ae);
            box-shadow: 0 3px 0 #2a9d8f;
            color: white;
        }
        .past-to-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 10px;
        }
        .past-to-btn {
            padding: clamp(10px, 3vw, 15px) clamp(20px, 5vw, 30px);
            background: linear-gradient(145deg, #a8e6cf, #8dd7b9);
            color: #333;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: clamp(1rem, 3vw, 1.2rem);
            font-weight: bold;
            box-shadow: 0 4px 0 #6bc5a3;
            transition: all 0.3s ease;
        }
        .past-to-btn:hover {
            background: linear-gradient(145deg, #8dd7b9, #7bc9a9);
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #6bc5a3;
        }
        .past-to-btn.selected {
            background: linear-gradient(145deg, #4ecdc4, #36b7ae);
            box-shadow: 0 0 15px #4ecdc4;
        }
        .input-display.correct {
            animation: correctPulse 0.5s ease;
            border: 4px solid #4ecdc4;
        }
        .input-display.incorrect {
            animation: shake 0.5s ease;
            border: 4px solid #ff6b6b;
        }
        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }
        .option {
            padding: clamp(10px, 3vw, 15px) clamp(15px, 4vw, 20px);
            background: linear-gradient(145deg, #a8e6cf, #8dd7b9);
            color: #333;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            flex: 1 0 45%;
            min-width: min(200px, 42vw);
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 0 #6bc5a3;
        }
        .option:hover:not(:disabled) {
            background: linear-gradient(145deg, #8dd7b9, #7bc9a9);
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #6bc5a3;
        }
        .option:disabled {
            cursor: not-allowed;
        }
        .option.incorrect {
            background: linear-gradient(145deg, #ff8ba0, #ff6b6b);
            box-shadow: 0 4px 0 #e05555;
        }
        .option.correct-answer {
            background: linear-gradient(145deg, #4ecdc4, #36b7ae);
            box-shadow: 0 0 15px #4ecdc4;
            animation: pulse 1s infinite;
        }
        .feedback {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            margin: 15px;
            min-height: 40px;
            font-weight: bold;
            padding: 0 10px;
        }
        .correct {
            color: #4ecdc4;
            text-shadow: 1px 1px 0 #2a9d8f;
        }
        .incorrect {
            color: #ff6b6b;
            text-shadow: 1px 1px 0 #e63946;
        }
        .format-toggle {
            margin: 15px;
        }
        .clock-number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: clamp(0.9rem, 3vw, 1.3rem);
            font-weight: bold;
        }
        .clock-number span {
            position: absolute;
            display: block;
            width: min(30px, 9vw);
            height: min(30px, 9vw);
            line-height: min(30px, 9vw);
            color: #333;
            text-shadow: 1px 1px 0 #ffd166;
        }
        .minute-ticks {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
        .minute-tick {
            position: absolute;
            background-color: #666;
            transform-origin: center center;
            left: 50%;
            top: 50%;
        }
        .minute-tick.major {
            background-color: #333;
            height: 14px;
            width: 3px;
        }
        .minute-tick.minor {
            background-color: #999;
            height: 8px;
            width: 2px;
        }
        .score-display {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            margin: 4px 8px;
            padding: clamp(5px, 1.5vw, 8px) clamp(12px, 3vw, 15px);
            background: linear-gradient(145deg, #ffd166, #ffc145);
            border-radius: 15px;
            display: inline-block;
            color: #333;
            font-weight: bold;
            box-shadow: 0 3px 0 #e0b14d;
            flex-shrink: 0;
        }
        .progress-display {
            font-size: clamp(0.85rem, 2.8vw, 1.1rem);
            margin: 4px 8px;
            padding: clamp(5px, 1.5vw, 8px) clamp(12px, 3vw, 15px);
            background: linear-gradient(145deg, #a8e6cf, #8dd7b9);
            border-radius: 15px;
            display: inline-block;
            color: #333;
            font-weight: bold;
            box-shadow: 0 3px 0 #6bc5a3;
            flex-shrink: 0;
        }
        .stats-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
            flex-shrink: 0;
        }
        .review-container {
            display: none;
            margin: 15px auto;
            max-width: 95vw;
            background: white;
            padding: clamp(15px, 4vw, 20px);
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .review-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: clamp(8px, 2vw, 10px);
            margin: 15px 0;
            padding: clamp(15px, 4vw, 20px);
            background: #f8f9fa;
            border-radius: 15px;
        }
        .review-btn {
            padding: clamp(10px, 3vw, 15px);
            background: linear-gradient(145deg, #a8e6cf, #8dd7b9);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            font-weight: bold;
            color: #333;
            transition: all 0.3s ease;
            box-shadow: 0 3px 0 #6bc5a3;
        }
        .review-btn:hover {
            background: linear-gradient(145deg, #8dd7b9, #7bc9a9);
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #6bc5a3;
        }
        .review-btn.correct {
            background: linear-gradient(145deg, #4ecdc4, #36b7ae);
            box-shadow: 0 3px 0 #2a9d8f;
        }
        .review-btn.correct:hover {
            background: linear-gradient(145deg, #36b7ae, #2a9d8f);
            box-shadow: 0 5px 0 #2a9d8f;
        }
        .review-btn.incorrect {
            background: linear-gradient(145deg, #ff8ba0, #ff6b6b);
            box-shadow: 0 3px 0 #e05555;
        }
        .review-btn.incorrect:hover {
            background: linear-gradient(145deg, #ff6b6b, #e05555);
            box-shadow: 0 5px 0 #e05555;
        }
        .question-detail {
            display: none;
            margin-top: 15px;
            padding: clamp(15px, 4vw, 20px);
            background: linear-gradient(145deg, #fff9e6, #fff5cc);
            border-radius: 15px;
            border: 3px solid #ffd166;
        }
        .question-detail.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .question-detail-clock {
            width: min(220px, 60vw);
            height: min(220px, 60vw);
            margin: 15px auto;
            border: min(12px, 3.5vw) solid #ff9a76;
            border-radius: 50%;
            background: linear-gradient(45deg, #fff5e6, #ffe8cc);
            position: relative;
        }
        .question-detail-clock .hand {
            position: absolute;
            transform-origin: bottom center;
            left: 50%;
            bottom: 50%;
            transform: translateX(-50%);
        }
        .question-detail-clock .hour-hand {
            width: min(8px, 2.5vw);
            height: min(70px, 22vw);
            background-color: #ff6b6b;
        }
        .question-detail-clock .minute-hand {
            width: min(6px, 2vw);
            height: min(100px, 30vw);
            background-color: #4ecdc4;
        }
        .question-detail-clock .center-circle {
            position: absolute;
            width: min(16px, 5vw);
            height: min(16px, 5vw);
            background-color: #ffd166;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        .question-detail-clock .clock-number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            font-weight: bold;
        }
        .question-detail-clock .clock-number span {
            position: absolute;
            display: block;
            width: min(24px, 7vw);
            height: min(24px, 7vw);
            line-height: min(24px, 7vw);
            color: #333;
            text-shadow: 1px 1px 0 #ffd166;
        }
        .question-detail-clock .minute-ticks {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
        .question-detail-clock .minute-tick {
            position: absolute;
            background-color: #666;
            transform-origin: bottom center;
            left: 50%;
            bottom: 50%;
        }
        .question-detail-clock .minute-tick.major {
            background-color: #333;
            height: 10px;
            width: 2px;
            transform: translateX(-50%);
        }
        .question-detail-clock .minute-tick.minor {
            background-color: #999;
            height: 5px;
            width: 1px;
            transform: translateX(-50%);
        }
        .back-to-buttons-btn {
            padding: clamp(8px, 2.5vw, 10px) clamp(15px, 4vw, 20px);
            background: linear-gradient(145deg, #ff9a76, #ff8a61);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: clamp(0.9rem, 3vw, 1rem);
            font-weight: bold;
            margin-top: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 3px 0 #e07a4f;
        }

        .back-to-buttons-btn:hover {
            background: linear-gradient(145deg, #ff8a61, #ff7a4c);
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #e07a4f;
        }
        #playAgainBtn {
            padding: clamp(12px, 3vw, 15px) clamp(20px, 5vw, 30px);
            background: linear-gradient(145deg, #4ecdc4, #36b7ae);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 0 #2a9d8f;
            margin: 15px;
        }

        #playAgainBtn:hover {
            background: linear-gradient(145deg, #36b7ae, #2a9d8f);
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #2a9d8f;
        }

        #playAgainBtn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #2a9d8f;
        }
        #homeBtn {
            padding: clamp(12px, 3vw, 15px) clamp(20px, 5vw, 30px);
            background: linear-gradient(145deg, #ff9a76, #ff8a61);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 0 #e07a4f;
            margin: 15px;
        }
        #homeBtn:hover {
            background: linear-gradient(145deg, #ff8a61, #ff7a4c);
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #e07a4f;
        }
        #homeBtn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #e07a4f;
        }
        .timer-display {
            display: none;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 5px #4ecdc4, 0 4px 0 #36b7ae;
                transform: translateY(-1px);
            }
            50% {
                box-shadow: 0 0 20px #4ecdc4, 0 6px 0 #36b7ae;
                transform: translateY(-3px);
            }
            100% {
                box-shadow: 0 0 5px #4ecdc4, 0 4px 0 #36b7ae;
                transform: translateY(-1px);
            }
        }

        /* Responsive adjustments for small screens */
        @media (max-width: 480px) {
            .review-buttons {
                grid-template-columns: repeat(5, 1fr);
            }
            .review-btn {
                font-size: 0.9rem;
                padding: 8px;
            }
            .advanced-mode-wrapper {
                flex-direction: column;
                align-items: center;
            }
        }

        @media (max-width: 360px) {
            .review-buttons {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <h1>⏰ Time Learning Game</h1>
    <div class="stats-container">
        <div class="difficulty-badge" id="difficultyBadge">Beginner</div>
        <div class="score-display">Score: <span id="score">0</span></div>
        <div class="progress-display">Question: <span id="currentQuestion">1</span>/10</div>
    </div>

    <div id="beginnerMode">
        <div class="clock-container" id="clock">
        <div class="clock-number" id="clockNumbers"></div>
        <div class="hand hour-hand" id="hourHand"></div>
        <div class="hand minute-hand" id="minuteHand"></div>
        <div class="center-circle"></div>
        </div>
        <div class="options" id="options"></div>
        <div class="feedback" id="feedback"></div>
    </div>

    <div id="advancedMode" style="display: none;">
        <div class="advanced-mode-wrapper">
            <div style="display: flex; flex-direction: column; align-items: center;">
                <div class="clock-container" id="advancedClock">
                    <div class="clock-number" id="advancedClockNumbers"></div>
                    <div class="minute-ticks" id="advancedMinuteTicks"></div>
                    <div class="hand hour-hand" id="advancedHourHand"></div>
                    <div class="hand minute-hand" id="advancedMinuteHand"></div>
                    <div class="center-circle"></div>
                </div>

                <div class="format-indicator" id="formatIndicator">Digital Format</div>
            </div>

            <div class="numpad-container">
                <div class="input-display" style="margin-bottom: 15px;">
                    <div class="input-text" id="inputDisplay" style="flex-wrap: nowrap;">
                        <span class="empty">0</span>
                        <span class="empty">0</span>
                        <span>:</span>
                        <span class="empty">0</span>
                        <span class="empty">0</span>
                    </div>
                    <div id="textFormatInputs" style="display: none; margin-top: 15px;">
                        <div class="past-to-selector">
                            <button class="past-to-btn" id="pastBtn">past</button>
                            <button class="past-to-btn" id="toBtn">to</button>
                        </div>
                    </div>
                </div>

                <div class="numpad">
                    <button class="num-btn" data-num="1">1</button>
                    <button class="num-btn" data-num="2">2</button>
                    <button class="num-btn" data-num="3">3</button>
                    <button class="num-btn clear" data-action="clear">C</button>
                    <button class="num-btn" data-num="4">4</button>
                    <button class="num-btn" data-num="5">5</button>
                    <button class="num-btn" data-num="6">6</button>
                    <button class="num-btn" data-num="0">0</button>
                    <button class="num-btn" data-num="7">7</button>
                    <button class="num-btn" data-num="8">8</button>
                    <button class="num-btn" data-num="9">9</button>
                    <button class="num-btn submit" data-action="submit">✓</button>
                </div>
            </div>
        </div>

        <div class="feedback" id="advancedFeedback"></div>
    </div>

    <!-- Review Section -->
    <div class="review-container" id="reviewContainer">
        <h2 style="color: #ff6b6b; margin-bottom: 20px;">📊 Review Your Answers</h2>
        <div id="reviewSummary"></div>
        <div id="reviewButtons" class="review-buttons"></div>
        <div id="questionDetail" class="question-detail"></div>
        <div id="playAgainSection" style="display: none;">
            <button id="playAgainBtn" style="margin-right: 10px;">🎮 Play Again</button>
            <button id="homeBtn">🏠 Home</button>
        </div>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const difficulty = urlParams.get('difficulty') || 'beginner';

        // Game state
        let currentHour = 0;
        let currentMinute = 0;
        let correctAnswer = '';
        let isDigitalFormat = Math.random() < 0.5;
        let score = 0;
        let timer = null;
        let timeLeft = 2;
        let questionHistory = [];
        let currentQuestionNum = 1;
        let userInput = [];
        let selectedPastTo = '';
        const QUESTIONS_PER_ROUND = 10;

        // DOM elements
        const hourHand = document.getElementById('hourHand');
        const minuteHand = document.getElementById('minuteHand');
        const optionsContainer = document.getElementById('options');
        const feedbackElement = document.getElementById('feedback');
        const clockNumbers = document.getElementById('clockNumbers');
        const scoreElement = document.getElementById('score');
        const currentQuestionElement = document.getElementById('currentQuestion');
        const reviewContainer = document.getElementById('reviewContainer');
        const reviewSummary = document.getElementById('reviewSummary');
        const reviewButtons = document.getElementById('reviewButtons');
        const questionDetail = document.getElementById('questionDetail');
        const playAgainBtn = document.getElementById('playAgainBtn');
        const playAgainSection = document.getElementById('playAgainSection');
        const clockContainer = document.getElementById('clock');
        const difficultyBadge = document.getElementById('difficultyBadge');

        // Advanced mode DOM elements
        const beginnerMode = document.getElementById('beginnerMode');
        const advancedMode = document.getElementById('advancedMode');
        const advancedClock = document.getElementById('advancedClock');
        const advancedClockNumbers = document.getElementById('advancedClockNumbers');
        const advancedHourHand = document.getElementById('advancedHourHand');
        const advancedMinuteHand = document.getElementById('advancedMinuteHand');
        const formatIndicator = document.getElementById('formatIndicator');
        const inputDisplay = document.getElementById('inputDisplay');
        const textFormatInputs = document.getElementById('textFormatInputs');
        const pastBtn = document.getElementById('pastBtn');
        const toBtn = document.getElementById('toBtn');
        const advancedFeedback = document.getElementById('advancedFeedback');

        // Set difficulty badge and mode
        difficultyBadge.textContent = difficulty.charAt(0).toUpperCase() + difficulty.slice(1);
        difficultyBadge.className = `difficulty-badge ${difficulty}`;

        if (difficulty === 'advanced') {
            beginnerMode.style.display = 'none';
            advancedMode.style.display = 'block';
            createAdvancedClockNumbers();
        } else {
            beginnerMode.style.display = 'block';
            advancedMode.style.display = 'none';
            createClockNumbers();
        }

        // Initialize game
        startNewRound();

        // Event listeners
        playAgainBtn.addEventListener('click', startNewRound);
        document.getElementById('homeBtn').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        // Numpad event listeners
        document.querySelectorAll('.num-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const num = btn.dataset.num;
                const action = btn.dataset.action;

                if (action === 'clear') {
                    clearInput();
                } else if (action === 'submit') {
                    submitAnswer();
                } else if (num !== undefined) {
                    addDigit(num);
                }
            });
        });

        // Past/To buttons
        pastBtn.addEventListener('click', () => {
            selectedPastTo = 'past';
            pastBtn.classList.add('selected');
            toBtn.classList.remove('selected');
        });

        toBtn.addEventListener('click', () => {
            selectedPastTo = 'to';
            toBtn.classList.add('selected');
            pastBtn.classList.remove('selected');
        });
        
        function startNewRound() {
            // Reset game state
            score = 0;
            currentQuestionNum = 1;
            questionHistory = [];

            // Update displays
            scoreElement.textContent = score;
            currentQuestionElement.textContent = currentQuestionNum;

            // Show game elements, hide review
            if (difficulty === 'advanced') {
                advancedMode.style.display = 'block';
                beginnerMode.style.display = 'none';
                reviewContainer.style.display = 'none';
                playAgainSection.style.display = 'none';
            } else {
                beginnerMode.style.display = 'block';
                advancedMode.style.display = 'none';
                reviewContainer.style.display = 'none';
                playAgainSection.style.display = 'none';
            }

            // Start first question
            generateNewQuestion();
        }

        function createAdvancedClockNumbers() {
            const radius = 40;
            for (let i = 1; i <= 12; i++) {
                const angle = (i - 3) * 30 * Math.PI / 180;
                const x = 50 + radius * Math.cos(angle);
                const y = 50 + radius * Math.sin(angle);

                const numberSpan = document.createElement('span');
                numberSpan.textContent = i;
                numberSpan.style.left = `${x}%`;
                numberSpan.style.top = `${y}%`;
                numberSpan.style.transform = 'translate(-50%, -50%)';
                numberSpan.style.fontSize = '1.2rem';
                advancedClockNumbers.appendChild(numberSpan);
            }

            // Create minute ticks for advanced mode
            createMinuteTicks(advancedMinuteTicks);
        }

        function createMinuteTicks(container) {
            const radius = 42; // Distance from center in percentage

            for (let i = 0; i < 60; i++) {
                const tick = document.createElement('div');
                const isMajor = i % 5 === 0; // Major ticks every 5 minutes
                tick.className = `minute-tick ${isMajor ? 'major' : 'minor'}`;

                // Calculate position using polar coordinates
                const angle = i * 6 - 90; // Start from 12 o'clock
                const rad = angle * Math.PI / 180;
                const x = 50 + radius * Math.cos(rad);
                const y = 50 + radius * Math.sin(rad);

                tick.style.left = `${x}%`;
                tick.style.top = `${y}%`;
                tick.style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;

                container.appendChild(tick);
            }
        }

        function createClockNumbers() {
            // Use percentage-based positioning for responsive design
            const radius = 40; // 40% from center
            const clockContainer = document.querySelector('.clock-container');

            for (let i = 1; i <= 12; i++) {
                const angle = (i - 3) * 30 * Math.PI / 180;
                const x = 50 + radius * Math.cos(angle);
                const y = 50 + radius * Math.sin(angle);

                const numberSpan = document.createElement('span');
                numberSpan.textContent = i;
                numberSpan.style.left = `${x}%`;
                numberSpan.style.top = `${y}%`;
                numberSpan.style.transform = 'translate(-50%, -50%)';
                numberSpan.style.fontSize = '1.3rem';
                clockNumbers.appendChild(numberSpan);
            }
        }
        
        function generateNewQuestion() {
            // Check if round is complete
            if (currentQuestionNum > QUESTIONS_PER_ROUND) {
                showReview();
                return;
            }

            // Update progress display
            currentQuestionElement.textContent = currentQuestionNum;

            // Clear any existing timers
            if (timer) {
                clearTimeout(timer);
                timer = null;
            }

            // Generate random time (avoid o'clock for advanced mode)
            currentHour = Math.floor(Math.random() * 12) + 1;
            if (difficulty === 'advanced') {
                // Advanced mode: any minute from 1-59 (avoid 0)
                currentMinute = Math.floor(Math.random() * 59) + 1;
            } else {
                currentMinute = Math.floor(Math.random() * 12) * 5;
            }

            // Randomly choose format for this question
            if (difficulty === 'advanced') {
                isDigitalFormat = Math.random() < 0.5;
                userInput = [];
                selectedPastTo = '';
                updateInputDisplay();
                updateFormatIndicator();
                pastBtn.classList.remove('selected');
                toBtn.classList.remove('selected');
            } else {
                isDigitalFormat = Math.random() < 0.5;
            }

            // Reset feedback
            if (difficulty === 'advanced') {
                advancedFeedback.textContent = '';
                advancedFeedback.className = 'feedback';

                // Re-enable numpad
                const numBtns = document.querySelectorAll('.num-btn');
                numBtns.forEach(btn => btn.disabled = false);
            } else {
                feedbackElement.textContent = '';
                feedbackElement.className = 'feedback';
            }

            // Remove all button classes for beginner mode
            if (difficulty === 'beginner') {
                const options = document.querySelectorAll('.option');
                options.forEach(option => {
                    option.classList.remove('correct-answer', 'incorrect');
                    if (option.disabled) {
                        option.disabled = false;
                        option.style.background = 'linear-gradient(145deg, #a8e6cf, #8dd7b9)';
                        option.style.boxShadow = '0 4px 0 #6bc5a3';
                    }
                });
            }

            // Update clock display
            updateClock();

            // Set correct answer for advanced mode
            if (difficulty === 'advanced') {
                correctAnswer = isDigitalFormat
                    ? `${currentHour}:${currentMinute.toString().padStart(2, '0')}`
                    : generateTextTime(currentHour, currentMinute);
            }

            // Generate options for beginner mode
            if (difficulty === 'beginner') {
                generateOptions();
            }
        }

        function updateInputDisplay() {
            if (isDigitalFormat) {
                // Digital format: XX:XX
                const hour1 = userInput[0] !== undefined ? userInput[0] : '0';
                const hour2 = userInput[1] !== undefined ? userInput[1] : '0';
                const min1 = userInput[2] !== undefined ? userInput[2] : '0';
                const min2 = userInput[3] !== undefined ? userInput[3] : '0';

                const html = `
                    <span>${hour1}</span>
                    <span>${hour2}</span>
                    <span>:</span>
                    <span>${min1}</span>
                    <span>${min2}</span>
                `;
                inputDisplay.innerHTML = html;
                inputDisplay.style.flexWrap = 'nowrap';
                inputDisplay.style.fontSize = 'clamp(1.8rem, 5vw, 2.5rem)';
            } else {
                // Text format: XX minutes past/to XX
                const min1 = userInput[0] !== undefined ? userInput[0] : '0';
                const min2 = userInput[1] !== undefined ? userInput[1] : '0';
                const hour1 = userInput[2] !== undefined ? userInput[2] : '0';
                const hour2 = userInput[3] !== undefined ? userInput[3] : '0';
                const pastToText = selectedPastTo || 'past/to';

                const html = `
                    <span>${min1}</span>
                    <span>${min2}</span>
                    <span class="no-bg">min</span>
                    <span>${pastToText}</span>
                    <span>${hour1}</span>
                    <span>${hour2}</span>
                `;
                inputDisplay.innerHTML = html;
                inputDisplay.style.flexWrap = 'nowrap';
                inputDisplay.style.fontSize = 'clamp(1.2rem, 3.5vw, 1.8rem)';
            }
        }

        function updateFormatIndicator() {
            if (isDigitalFormat) {
                formatIndicator.textContent = 'Digital Format (XX:XX)';
                formatIndicator.className = 'format-indicator digital';
                textFormatInputs.style.display = 'none';
            } else {
                formatIndicator.textContent = 'Text Format (XX minutes past/to XX)';
                formatIndicator.className = 'format-indicator';
                textFormatInputs.style.display = 'block';
            }
            updateInputDisplay();
        }

        function addDigit(digit) {
            if (isDigitalFormat) {
                // Digital format: 4 digits (XX:XX)
                if (userInput.length < 4) {
                    userInput.push(digit);
                    updateInputDisplay();
                }
            } else {
                // Text format: 4 digits (XX minutes past/to XX)
                if (userInput.length < 4) {
                    userInput.push(digit);
                    updateInputDisplay();
                }
            }
        }

        function clearInput() {
            userInput = [];
            updateInputDisplay();
        }

        function submitAnswer() {
            if (difficulty !== 'advanced') return;

            let userAnswer;

            if (isDigitalFormat) {
                if (userInput.length !== 4) {
                    advancedFeedback.textContent = 'Please enter 4 digits';
                    advancedFeedback.className = 'feedback incorrect';
                    return;
                }

                const userHour = parseInt(userInput[0] + userInput[1]);
                const userMin = parseInt(userInput[2] + userInput[3]);
                userAnswer = `${userHour}:${userMin.toString().padStart(2, '0')}`;
            } else {
                if (userInput.length !== 4 || !selectedPastTo) {
                    advancedFeedback.textContent = selectedPastTo ? 'Please enter 4 digits' : 'Please select past or to';
                    advancedFeedback.className = 'feedback incorrect';
                    return;
                }

                const userMin = parseInt(userInput[0] + userInput[1]);
                const userHour = parseInt(userInput[2] + userInput[3]);
                userAnswer = `${userMin} minute${userMin !== 1 ? 's' : ''} ${selectedPastTo} ${userHour}`;
            }

            checkAdvancedAnswer(userAnswer);
        }
        
        function updateClock() {
            const hourAngle = (currentHour % 12) * 30 + (currentMinute / 60) * 30;
            const minuteAngle = currentMinute * 6;

            hourHand.style.transform = `rotate(${hourAngle}deg)`;
            minuteHand.style.transform = `rotate(${minuteAngle}deg)`;

            if (difficulty === 'advanced') {
                advancedHourHand.style.transform = `rotate(${hourAngle}deg)`;
                advancedMinuteHand.style.transform = `rotate(${minuteAngle}deg)`;
            }
        }
        
        function generateOptions() {
            optionsContainer.innerHTML = '';
            
            correctAnswer = isDigitalFormat 
                ? `${currentHour}:${currentMinute.toString().padStart(2, '0')}`
                : generateTextTime(currentHour, currentMinute);
            
            const options = [correctAnswer];
            
            while (options.length < 4) {
                let incorrectHour = currentHour;
                let incorrectMinute = currentMinute;
                
                if (Math.random() < 0.5) {
                    incorrectHour += Math.random() < 0.5 ? 1 : -1;
                    if (incorrectHour > 12) incorrectHour = 1;
                    if (incorrectHour < 1) incorrectHour = 12;
                } else {
                    const minuteChange = Math.random() < 0.5 ? 5 : 10;
                    incorrectMinute += Math.random() < 0.5 ? minuteChange : -minuteChange;
                    if (incorrectMinute >= 60) incorrectMinute -= 60;
                    if (incorrectMinute < 0) incorrectMinute += 60;
                }
                
                const incorrectAnswer = isDigitalFormat 
                    ? `${incorrectHour}:${incorrectMinute.toString().padStart(2, '0')}`
                    : generateTextTime(incorrectHour, incorrectMinute);
                
                if (!options.includes(incorrectAnswer)) {
                    options.push(incorrectAnswer);
                }
            }
            
            shuffleArray(options);
            
            options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option';
                button.textContent = option;
                button.setAttribute('data-answer', option);
                button.addEventListener('click', () => checkAnswer(option));
                optionsContainer.appendChild(button);
            });
        }
        
        function generateTextTime(hour, minute) {
            if (minute === 0) {
                return `${hour} o'clock`;
            } else if (minute === 15) {
                return `15 minutes past ${hour}`;
            } else if (minute === 30) {
                return `half past ${hour}`;
            } else if (minute === 45) {
                return `15 minutes to ${hour === 12 ? 1 : hour + 1}`;
            } else if (minute < 30) {
                return `${minute} minute${minute !== 1 ? 's' : ''} past ${hour}`;
            } else {
                return `${60 - minute} minute${(60 - minute) !== 1 ? 's' : ''} to ${hour === 12 ? 1 : hour + 1}`;
            }
        }
        
        function checkAnswer(selectedAnswer) {
            // Disable all options to prevent multiple clicks
            const options = document.querySelectorAll('.option');
            options.forEach(option => {
                option.disabled = true;
            });

            // Record question history
            const isCorrect = selectedAnswer === correctAnswer;
            questionHistory.push({
                hour: currentHour,
                minute: currentMinute,
                correctAnswer: correctAnswer,
                selectedAnswer: selectedAnswer,
                isCorrect: isCorrect,
                format: isDigitalFormat ? 'digital' : 'text'
            });

            if (isCorrect) {
                feedbackElement.textContent = 'Correct! Well done! ✨';
                feedbackElement.className = 'feedback correct';
                score++;
                scoreElement.textContent = score;

                // Highlight the correct answer
                options.forEach(option => {
                    if (option.getAttribute('data-answer') === correctAnswer) {
                        option.classList.add('correct-answer');
                    }
                });
            } else {
                feedbackElement.textContent = `Incorrect. The correct answer is: ${correctAnswer}`;
                feedbackElement.className = 'feedback incorrect';

                // Highlight the correct answer and mark incorrect answer
                options.forEach(option => {
                    if (option.getAttribute('data-answer') === correctAnswer) {
                        option.classList.add('correct-answer');
                    } else if (option.getAttribute('data-answer') === selectedAnswer) {
                        option.classList.add('incorrect');
                    }
                });
            }

            // Move to next question after 2 seconds
            timer = setTimeout(() => {
                currentQuestionNum++;
                generateNewQuestion();
            }, 2000);
        }

        function checkAdvancedAnswer(selectedAnswer) {
            // Record question history
            const isCorrect = selectedAnswer === correctAnswer;
            questionHistory.push({
                hour: currentHour,
                minute: currentMinute,
                correctAnswer: correctAnswer,
                selectedAnswer: selectedAnswer,
                isCorrect: isCorrect,
                format: isDigitalFormat ? 'digital' : 'text'
            });

            // Disable numpad
            const numBtns = document.querySelectorAll('.num-btn');
            numBtns.forEach(btn => btn.disabled = true);

            // Show animation on input display
            const displayContainer = inputDisplay.closest('.input-display');

            if (isCorrect) {
                advancedFeedback.textContent = 'Correct! Well done! ✨';
                advancedFeedback.className = 'feedback correct';
                score++;
                scoreElement.textContent = score;

                // Add correct animation
                displayContainer.classList.add('correct');
                setTimeout(() => displayContainer.classList.remove('correct'), 500);
            } else {
                advancedFeedback.textContent = `Incorrect. The correct answer is: ${correctAnswer}`;
                advancedFeedback.className = 'feedback incorrect';

                // Add incorrect animation
                displayContainer.classList.add('incorrect');
                setTimeout(() => displayContainer.classList.remove('incorrect'), 500);
            }

            // Move to next question after 2 seconds
            timer = setTimeout(() => {
                currentQuestionNum++;
                generateNewQuestion();
            }, 2000);
        }
        
        function showReview() {
            // Hide game elements
            if (difficulty === 'advanced') {
                advancedMode.style.display = 'none';
            } else {
                clockContainer.style.display = 'none';
                optionsContainer.style.display = 'none';
                feedbackElement.textContent = '';
            }

            // Show review container
            reviewContainer.style.display = 'block';
            playAgainSection.style.display = 'block';
            questionDetail.classList.remove('show');

            // Clear previous review
            reviewSummary.innerHTML = '';
            reviewButtons.innerHTML = '';

            // Calculate summary
            const correctCount = questionHistory.filter(q => q.isCorrect).length;
            const summaryHtml = `
                <div style="text-align: center; padding: 20px; background: linear-gradient(145deg, #e8f8f7, #d4f1f0); border-radius: 15px; margin-bottom: 20px;">
                    <h3 style="color: #2a9d8f; margin: 10px 0;">🎉 Round Complete!</h3>
                    <p style="font-size: 1.3rem; margin: 10px 0;">
                        Score: <strong>${correctCount}</strong> / ${QUESTIONS_PER_ROUND}
                    </p>
                    <p style="color: #666;">
                        ${correctCount === QUESTIONS_PER_ROUND ? 'Perfect score! 🌟' :
                          correctCount >= 7 ? 'Great job! 👍' :
                          correctCount >= 5 ? 'Good effort! Keep practicing! 💪' :
                          'Keep trying! You\'ll get better! 📚'}
                    </p>
                    <p style="font-size: 1rem; color: #999; margin-top: 10px;">Click a number to review that question</p>
                </div>
            `;
            reviewSummary.innerHTML = summaryHtml;

            // Generate review buttons
            questionHistory.forEach((question, index) => {
                const button = document.createElement('button');
                button.className = `review-btn ${question.isCorrect ? 'correct' : 'incorrect'}`;
                button.textContent = index + 1;
                button.title = question.isCorrect ? 'Correct' : 'Incorrect';
                button.addEventListener('click', () => showQuestionDetail(index));
                reviewButtons.appendChild(button);
            });

            // Scroll to review section
            reviewContainer.scrollIntoView({ behavior: 'smooth' });
        }
        
        function showQuestionDetail(index) {
            const question = questionHistory[index];

            // Hide buttons, show detail
            reviewButtons.style.display = 'none';
            playAgainSection.style.display = 'none';
            questionDetail.classList.add('show');

            // Calculate clock angles
            const hourAngle = (question.hour % 12) * 30 + (question.minute / 60) * 30;
            const minuteAngle = question.minute * 6;

            // Generate clock numbers HTML
            let clockNumbersHtml = '<div class="clock-number">';
            for (let i = 1; i <= 12; i++) {
                const angle = (i - 3) * 30 * Math.PI / 180;
                const x = 50 + 42 * Math.cos(angle);
                const y = 50 + 42 * Math.sin(angle);
                clockNumbersHtml += `<span style="left: ${x}%; top: ${y}%; transform: translate(-50%, -50%);">${i}</span>`;
            }
            clockNumbersHtml += '</div>';

            // Generate minute ticks for advanced mode review
            let minuteTicksHtml = '';
            if (difficulty === 'advanced') {
                minuteTicksHtml = '<div class="minute-ticks">';
                const radius = 42;
                for (let i = 0; i < 60; i++) {
                    const isMajor = i % 5 === 0;
                    const angle = i * 6 - 90;
                    const rad = angle * Math.PI / 180;
                    const x = 50 + radius * Math.cos(rad);
                    const y = 50 + radius * Math.sin(rad);
                    const tickHeight = isMajor ? 10 : 5;
                    minuteTicksHtml += `<div class="minute-tick ${isMajor ? 'major' : 'minor'}" style="left: ${x}%; top: ${y}%; transform: translate(-50%, -50%) rotate(${angle}deg); height: ${tickHeight}px; width: ${isMajor ? '2px' : '1px'};"></div>`;
                }
                minuteTicksHtml += '</div>';
            }

            let contentHtml;

            if (difficulty === 'beginner') {
                // Beginner mode - show options
                const correctAnswer = question.correctAnswer;
                const selectedAnswer = question.selectedAnswer;

                let optionsHtml = '<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0;">';
                const allOptions = [correctAnswer];

                // Re-create the incorrect options that were shown
                while (allOptions.length < 4) {
                    let incorrectHour = question.hour;
                    let incorrectMinute = question.minute;

                    if (Math.random() < 0.5) {
                        incorrectHour += Math.random() < 0.5 ? 1 : -1;
                        if (incorrectHour > 12) incorrectHour = 1;
                        if (incorrectHour < 1) incorrectHour = 12;
                    } else {
                        const minuteChange = Math.random() < 0.5 ? 5 : 10;
                        incorrectMinute += Math.random() < 0.5 ? minuteChange : -minuteChange;
                        if (incorrectMinute >= 60) incorrectMinute -= 60;
                        if (incorrectMinute < 0) incorrectMinute += 60;
                    }

                    let incorrectAnswer = question.format === 'digital'
                        ? `${incorrectHour}:${incorrectMinute.toString().padStart(2, '0')}`
                        : generateTextTime(incorrectHour, incorrectMinute);

                    if (!allOptions.includes(incorrectAnswer)) {
                        allOptions.push(incorrectAnswer);
                    }
                }

                // Display all options
                allOptions.forEach(option => {
                    const isOptionCorrect = option === correctAnswer;
                    const isSelected = option === selectedAnswer;
                    let optionClass = 'option';
                    let disabled = 'disabled';
                    let style = '';

                    if (isOptionCorrect) {
                        optionClass += ' correct-answer';
                        style = 'opacity: 1;';
                    } else if (isSelected) {
                        optionClass += ' incorrect';
                        style = 'opacity: 1;';
                    } else {
                        style = 'opacity: 0.5;';
                    }

                    optionsHtml += `<button class="${optionClass}" ${disabled} style="${style}">${option}</button>`;
                });
                optionsHtml += '</div>';

                contentHtml = `
                    <p style="color: #666; margin-bottom: 15px;">
                        Format: <strong>${question.format === 'digital' ? 'Digital' : 'Text'}</strong> |
                        ${question.isCorrect ? '✅ Correct' : '❌ Incorrect'}
                    </p>

                    <div class="question-detail-clock">
                        ${clockNumbersHtml}
                        <div class="hand hour-hand" style="transform: rotate(${hourAngle}deg);"></div>
                        <div class="hand minute-hand" style="transform: rotate(${minuteAngle}deg);"></div>
                        <div class="center-circle"></div>
                    </div>

                    ${optionsHtml}

                    <div style="margin-top: 20px; padding: 15px; background: ${question.isCorrect ? '#e8f8f7' : '#ffe8e8'}; border-radius: 10px;">
                        <p style="font-size: 1.1rem; margin: 5px 0;">
                            <strong>Your answer:</strong> ${question.selectedAnswer}
                        </p>
                        ${!question.isCorrect ? `
                            <p style="font-size: 1.1rem; margin: 5px 0; color: #ff6b6b;">
                                <strong>Correct answer:</strong> ${question.correctAnswer}
                            </p>
                        ` : `
                            <p style="font-size: 1.1rem; margin: 5px 0; color: #4ecdc4;">
                                <strong>Well done!</strong> 🌟
                            </p>
                        `}
                    </div>
                `;
            } else {
                // Advanced mode - no options, just show answers
                contentHtml = `
                    <p style="color: #666; margin-bottom: 15px;">
                        Format: <strong>${question.format === 'digital' ? 'Digital' : 'Text'}</strong> |
                        ${question.isCorrect ? '✅ Correct' : '❌ Incorrect'}
                    </p>

                    <div class="question-detail-clock">
                        ${clockNumbersHtml}
                        ${minuteTicksHtml}
                        <div class="hand hour-hand" style="transform: rotate(${hourAngle}deg);"></div>
                        <div class="hand minute-hand" style="transform: rotate(${minuteAngle}deg);"></div>
                        <div class="center-circle"></div>
                    </div>

                    <div style="margin-top: 20px; padding: 15px; background: ${question.isCorrect ? '#e8f8f7' : '#ffe8e8'}; border-radius: 10px;">
                        <p style="font-size: 1.1rem; margin: 5px 0;">
                            <strong>Your answer:</strong> ${question.selectedAnswer}
                        </p>
                        ${!question.isCorrect ? `
                            <p style="font-size: 1.1rem; margin: 5px 0; color: #ff6b6b;">
                                <strong>Correct answer:</strong> ${question.correctAnswer}
                            </p>
                        ` : `
                            <p style="font-size: 1.1rem; margin: 5px 0; color: #4ecdc4;">
                                <strong>Well done!</strong> 🌟
                            </p>
                        `}
                    </div>
                `;
            }

            questionDetail.innerHTML = `
                <h3 style="color: #ff6b6b; margin-bottom: 10px;">Question ${index + 1}</h3>
                ${contentHtml}
                <div style="text-align: center;">
                    <button class="back-to-buttons-btn" onclick="backToReviewButtons()">← Back to Review</button>
                </div>
            `;

            // Scroll to detail
            questionDetail.scrollIntoView({ behavior: 'smooth' });
        }
        
        function backToReviewButtons() {
            questionDetail.classList.remove('show');
            reviewButtons.style.display = 'grid';
            playAgainSection.style.display = 'block';
        }
        
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
    </script>
</body>
</html>
