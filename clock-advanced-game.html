<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock Advanced Game</title>
    <!-- 添加童趣字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: 'Comic Neue', cursive, Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 5px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }
        * {
            box-sizing: border-box;
        }
        h1 {
            font-size: clamp(1.2rem, 4vw, 2rem);
            color: #ff6b6b;
            text-shadow: 2px 2px 0 #ffd166;
            margin: 5px 0 8px 0;
            letter-spacing: 1px;
            word-wrap: break-word;
            flex-shrink: 0;
        }
        .question-type-badge {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: white;
            font-weight: bold;
            padding: 6px 15px;
            border-radius: 20px;
            margin: 5px;
            display: inline-block;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        .question-type-badge.type1 {
            background: linear-gradient(145deg, #ff6b6b, #ff5252);
        }
        .question-type-badge.type2 {
            background: linear-gradient(145deg, #4ecdc4, #36b7ae);
        }
        .clock-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 8px auto;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .clock-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .clock-label {
            font-size: clamp(1rem, 2.5vw, 1.1rem);
            color: #666;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .clock {
            width: min(200px, 45vw);
            height: min(200px, 45vw);
            margin: 5px auto;
            position: relative;
            border: min(15px, 4vw) solid #ff9a76;
            border-radius: 50%;
            background: linear-gradient(45deg, #fff5e6, #ffe8cc);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .clock-number {
            position: absolute;
            font-size: clamp(1.1rem, 2.8vw, 1.4rem);
            font-weight: bold;
            color: #333;
            text-shadow: 1px 1px 0 #ffd166;
            transform: translate(-50%, -50%);
        }

        .hand {
            position: absolute;
            transform-origin: bottom center;
            left: 50%;
            bottom: 50%;
            transform: translateX(-50%);
            background-color: #333;
        }
        .hour-hand {
            width: min(7px, 2.2vw);
            height: min(50px, 15vw);
            border-radius: 3.5px;
            background-color: #ff6b6b;
        }
        .minute-hand {
            width: min(6px, 1.8vw);
            height: min(75px, 23vw);
            border-radius: 3px;
            background-color: #4ecdc4;
        }
        .center-circle {
            position: absolute;
            width: min(20px, 6vw);
            height: min(20px, 6vw);
            background-color: #ffd166;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            border: min(3px, 1vw) solid #ff9a76;
        }
        .time-add {
            font-size: clamp(1.5rem, 5vw, 2rem);
            color: #4ecdc4;
            margin: 8px;
            font-weight: bold;
        }
        .question-text {
            font-size: clamp(1.3rem, 4.2vw, 1.7rem);
            color: #333;
            margin-bottom: 8px;
            line-height: 1.4;
            font-weight: 600;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 8px auto;
            max-width: 600px;
            padding: 0 5px;
            flex-shrink: 0;
        }
        .option {
            padding: clamp(10px, 3vw, 14px) clamp(14px, 4vw, 20px);
            background: linear-gradient(145deg, #a8e6cf, #8dd7b9);
            color: #333;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: clamp(1rem, 3.2vw, 1.2rem);
            flex: 1 0 45%;
            min-width: min(160px, 40vw);
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 3px 0 #6bc5a3;
        }
        .option:hover:not(:disabled) {
            background: linear-gradient(145deg, #8dd7b9, #7bc9a9);
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #6bc5a3;
        }
        .option:disabled {
            cursor: not-allowed;
        }
        .option.incorrect {
            background: linear-gradient(145deg, #ff8ba0, #ff6b6b);
            box-shadow: 0 4px 0 #e05555;
        }
        .option.correct-answer {
            background: linear-gradient(145deg, #4ecdc4, #36b7ae);
            box-shadow: 0 0 15px #4ecdc4;
            animation: pulse 1s infinite;
        }
        .feedback {
            font-size: clamp(1rem, 3.5vw, 1.4rem);
            margin: 8px;
            min-height: 35px;
            font-weight: bold;
            padding: 0 10px;
            flex-shrink: 0;
        }
        .correct {
            color: #4ecdc4;
            text-shadow: 1px 1px 0 #2a9d8f;
        }
        .incorrect {
            color: #ff6b6b;
            text-shadow: 1px 1px 0 #e63946;
        }
        .score-display {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            margin: 4px 8px;
            padding: clamp(5px, 1.5vw, 8px) clamp(12px, 3vw, 15px);
            background: linear-gradient(145deg, #ffd166, #ffc145);
            border-radius: 15px;
            display: inline-block;
            color: #333;
            font-weight: bold;
            box-shadow: 0 3px 0 #e0b14d;
            flex-shrink: 0;
        }
        .progress-display {
            font-size: clamp(0.85rem, 2.8vw, 1.1rem);
            margin: 4px 8px;
            padding: clamp(5px, 1.5vw, 8px) clamp(12px, 3vw, 15px);
            background: linear-gradient(145deg, #a8e6cf, #8dd7b9);
            border-radius: 15px;
            display: inline-block;
            color: #333;
            font-weight: bold;
            box-shadow: 0 3px 0 #6bc5a3;
            flex-shrink: 0;
        }
        .stats-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
            flex-shrink: 0;
        }
        }
        .review-container {
            display: none;
            margin: 15px auto;
            max-width: 95vw;
            background: white;
            padding: clamp(15px, 4vw, 20px);
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .review-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: clamp(8px, 2vw, 10px);
            margin: 15px 0;
            padding: clamp(15px, 4vw, 20px);
            background: #f8f9fa;
            border-radius: 15px;
        }
        .review-btn {
            padding: clamp(10px, 3vw, 15px);
            background: linear-gradient(145deg, #a8e6cf, #8dd7b9);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            font-weight: bold;
            color: #333;
            transition: all 0.3s ease;
            box-shadow: 0 3px 0 #6bc5a3;
        }
        .review-btn:hover {
            background: linear-gradient(145deg, #8dd7b9, #7bc9a9);
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #6bc5a3;
        }
        .review-btn.correct {
            background: linear-gradient(145deg, #4ecdc4, #36b7ae);
            box-shadow: 0 3px 0 #2a9d8f;
        }
        .review-btn.correct:hover {
            background: linear-gradient(145deg, #36b7ae, #2a9d8f);
            box-shadow: 0 5px 0 #2a9d8f;
        }
        .review-btn.incorrect {
            background: linear-gradient(145deg, #ff8ba0, #ff6b6b);
            box-shadow: 0 3px 0 #e05555;
        }
        .review-btn.incorrect:hover {
            background: linear-gradient(145deg, #ff6b6b, #e05555);
            box-shadow: 0 5px 0 #e05555;
        }
        .question-detail {
            display: none;
            margin-top: 15px;
            padding: clamp(15px, 4vw, 20px);
            background: linear-gradient(145deg, #fff9e6, #fff5cc);
            border-radius: 15px;
            border: 3px solid #ffd166;
        }
        .question-detail.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes pulse {
            0% {
                box-shadow: 0 0 5px #4ecdc4, 0 4px 0 #36b7ae;
                transform: translateY(-1px);
            }
            50% {
                box-shadow: 0 0 20px #4ecdc4, 0 6px 0 #36b7ae;
                transform: translateY(-3px);
            }
            100% {
                box-shadow: 0 0 5px #4ecdc4, 0 4px 0 #36b7ae;
                transform: translateY(-1px);
            }
        }
        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .btn {
            padding: clamp(15px, 4vw, 20px) clamp(30px, 8vw, 45px);
            background: linear-gradient(145deg, #4ecdc4, #36b7ae);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: clamp(1.1rem, 3.5vw, 1.4rem);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 0 #2a9d8f;
        }
        .btn:hover {
            background: linear-gradient(145deg, #36b7ae, #2a9d8f);
            box-shadow: 0 8px 0 #2a9d8f;
            transform: translateY(-3px);
        }
        .btn-home {
            background: linear-gradient(145deg, #ff9a76, #ff8a61);
            box-shadow: 0 5px 0 #e07a4f;
        }
        .btn-home:hover {
            background: linear-gradient(145deg, #ff8a61, #ff7a4c);
            box-shadow: 0 8px 0 #e07a4f;
        }
        @media (max-width: 600px) {
            .clock-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <h1>⏰ Clock Advanced Game</h1>
    <div class="stats-container">
        <div class="score-display">Score: <span id="score">0</span></div>
        <div class="progress-display">Question: <span id="currentQuestion">1</span>/10</div>
    </div>

    <div id="gameArea">
        <div class="question-type-badge" id="questionTypeBadge"></div>
        <div class="clock-container" id="clockContainer"></div>
        <div class="question-box">
            <div class="question-text" id="questionText"></div>
            <div class="time-info" id="timeInfo"></div>
        </div>
        <div class="options" id="options"></div>
        <div class="feedback" id="feedback"></div>
    </div>

    <div class="review-container" id="reviewContainer">
        <h2 style="color: #ff6b6b; margin-bottom: 20px;">📊 Review Your Answers</h2>
        <div id="reviewSummary"></div>
        <div id="reviewButtons" class="review-buttons"></div>
        <div id="questionDetail" class="question-detail"></div>
        <div id="playAgainSection" style="display: none; text-align: center;">
            <button class="btn" id="playAgainBtn" style="margin-right: 10px;">🎮 Play Again</button>
            <button class="btn btn-home" id="homeBtn">🏠 Home</button>
        </div>
    </div>

    <script>
        // 遊戲狀態
        let currentHour = 0;
        let currentMinute = 0;
        let correctAnswer = '';
        let score = 0;
        let timer = null;
        let questionHistory = [];
        let currentQuestionNum = 1;
        const QUESTIONS_PER_ROUND = 10;
        const TIME_OPTIONS = [15, 30, 45, 60]; // 分鐘

        // DOM 元素
        const questionTypeBadge = document.getElementById('questionTypeBadge');
        const clockContainer = document.getElementById('clockContainer');
        const questionText = document.getElementById('questionText');
        const timeInfo = document.getElementById('timeInfo');
        const optionsContainer = document.getElementById('options');
        const feedbackElement = document.getElementById('feedback');
        const scoreElement = document.getElementById('score');
        const currentQuestionElement = document.getElementById('currentQuestion');
        const gameArea = document.getElementById('gameArea');
        const reviewContainer = document.getElementById('reviewContainer');
        const reviewSummary = document.getElementById('reviewSummary');
        const reviewButtons = document.getElementById('reviewButtons');
        const questionDetail = document.getElementById('questionDetail');
        const playAgainBtn = document.getElementById('playAgainBtn');
        const playAgainSection = document.getElementById('playAgainSection');

        // 初始化遊戲
        startNewRound();

        // 事件監聽器
        playAgainBtn.addEventListener('click', startNewRound);
        document.getElementById('homeBtn').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        function startNewRound() {
            // 重置遊戲狀態
            score = 0;
            currentQuestionNum = 1;
            questionHistory = [];

            // 更新顯示
            scoreElement.textContent = score;
            currentQuestionElement.textContent = currentQuestionNum;

            // 顯示遊戲區域
            gameArea.style.display = 'block';
            reviewContainer.style.display = 'none';
            playAgainSection.style.display = 'none';

            // 開始第一題
            generateNewQuestion();
        }

        function generateNewQuestion() {
            // 檢查是否完成所有問題
            if (currentQuestionNum > QUESTIONS_PER_ROUND) {
                showReview();
                return;
            }

            // 更新進度顯示
            currentQuestionElement.textContent = currentQuestionNum;

            // 重置計時器
            if (timer) {
                clearTimeout(timer);
                timer = null;
            }

            // 重置反饋
            feedbackElement.textContent = '';
            feedbackElement.className = 'feedback';

            // 移除所有按鈕樣式
            const options = document.querySelectorAll('.option');
            options.forEach(option => {
                option.classList.remove('correct-answer', 'incorrect');
                if (option.disabled) {
                    option.disabled = false;
                    option.style.background = 'linear-gradient(145deg, #a8e6cf, #8dd7b9)';
                    option.style.boxShadow = '0 4px 0 #6bc5a3';
                }
            });

            // 隨機選擇題目類型
            const questionType = Math.random() < 0.5 ? 1 : 2;

            if (questionType === 1) {
                generateFutureTimeQuestion();
            } else {
                generateTimeDifferenceQuestion();
            }
        }

        function generateFutureTimeQuestion() {
            // 第一種題目：過去一段時間後是幾點?
            questionTypeBadge.textContent = '⭐ Type 1: Future Time';
            questionTypeBadge.className = 'question-type-badge type1';

            // 生成隨機起始時間
            currentHour = Math.floor(Math.random() * 12) + 1; // 1-12
            currentMinute = Math.floor(Math.random() * 12) * 5; // 0, 5, 10, ..., 55

            // 隨機選擇要過去的時間
            const minutesToAdd = TIME_OPTIONS[Math.floor(Math.random() * TIME_OPTIONS.length)];

            // 計算未來時間
            const startMinutes = currentHour * 60 + currentMinute;
            const futureMinutes = startMinutes + minutesToAdd;
            let futureHour = Math.floor(futureMinutes / 60);
            const futureMinute = futureMinutes % 60;

            // 調整小時為12小時制
            futureHour = ((futureHour - 1) % 12) + 1;

            // 設定正確答案
            correctAnswer = `${futureHour}:${futureMinute.toString().padStart(2, '0')}`;

            // 設定問題文字
            questionText.textContent = `If ${minutesToAdd} minutes pass, what time will it be?`;
            timeInfo.innerHTML = '';

            // 顯示時鐘
            clockContainer.innerHTML = `
                <div class="clock-wrapper">
                    <div class="clock-label">Start</div>
                    ${createClockHTML(currentHour, currentMinute)}
                </div>
                <div class="time-add">+${minutesToAdd}min</div>
                <div class="clock-wrapper" style="opacity: 0.1;">
                    <div class="clock-label">Future</div>
                    ${createClockHTML(futureHour, futureMinute, true)}
                </div>
            `;

            // 生成選項
            generateTimeOptions(futureHour, futureMinute);
        }

        function generateTimeDifferenceQuestion() {
            // 第二種題目：兩個時間之間差多少?
            questionTypeBadge.textContent = '⏱️ Type 2: Time Difference';
            questionTypeBadge.className = 'question-type-badge type2';

            // 生成第一個時間
            const startHour = Math.floor(Math.random() * 12) + 1;
            const startMinute = Math.floor(Math.random() * 12) * 5;

            // 生成時間差（控制在小於等於 6 小時）
            const maxDifference = 6 * 60; // 6 小時
            let difference;
            do {
                // 生成第二個時間
                let endHour = Math.floor(Math.random() * 12) + 1;
                const endMinute = Math.floor(Math.random() * 12) * 5;

                // 計算時間差（分鐘）
                const startMinutes = startHour * 60 + startMinute;
                let endMinutes = endHour * 60 + endMinute;

                // 確保結束時間晚於開始時間
                if (endMinutes <= startMinutes) {
                    endMinutes += 12 * 60;
                }

                difference = endMinutes - startMinutes;

                if (difference <= maxDifference) {
                    // 符合條件，使用這個時間
                    const hours = Math.floor(difference / 60);
                    const minutes = difference % 60;

                    // 設定正確答案
                    if (hours === 0) {
                        correctAnswer = `${minutes} minutes`;
                    } else {
                        correctAnswer = `${hours} hour${hours > 1 ? 's' : ''} ${minutes} minutes`;
                    }

                    // 設定問題文字
                    questionText.textContent = 'How much time has passed from the first clock to the second clock?';
                    timeInfo.innerHTML = '';

                    // 顯示時鐘
                    clockContainer.innerHTML = `
                        <div class="clock-wrapper">
                            <div class="clock-label">First</div>
                            ${createClockHTML(startHour, startMinute)}
                        </div>
                        <div class="time-add">→</div>
                        <div class="clock-wrapper">
                            <div class="clock-label">Second</div>
                            ${createClockHTML(endHour, endMinute, true)}
                        </div>
                    `;

                    // 生成選項
                    generateDifferenceOptions(hours, minutes, difference);
                    return;
                }
            } while (true); // 重新生成直到符合條件
        }

        function createClockHTML(hour, minute, isFuture = false) {
            const hourAngle = (hour % 12) * 30 + (minute / 2);
            const minuteAngle = minute * 6;

            // 使用三角函數計算數字位置，從 12 點開始順時針排列
            const radius = 42; // 數字距離圓心的距離（百分比）
            let clockNumbers = '';
            for (let i = 1; i <= 12; i++) {
                // i=1 應該在 30° 位置，i=12 應該在 0°（頂部）位置
                const angle = (i * 30 - 90) * (Math.PI / 180);
                const left = 50 + radius * Math.cos(angle);
                const top = 50 + radius * Math.sin(angle);
                clockNumbers += `<div class="clock-number" style="left: ${left}%; top: ${top}%;">${i}</div>`;
            }

            return `
                <div class="clock">
                    ${clockNumbers}

                    <div class="hand hour-hand" style="transform: rotate(${hourAngle}deg);"></div>
                    <div class="hand minute-hand" style="transform: rotate(${minuteAngle}deg);"></div>

                    <div class="center-circle"></div>
                </div>
            `;
        }

        function formatTime(hour, minute) {
            return `${hour}:${minute.toString().padStart(2, '0')}`;
        }

        function generateTimeOptions(correctHour, correctMinute) {
            optionsContainer.innerHTML = '';
            const options = [correctAnswer];

            // 生成錯誤選項，確保合理且接近
            while (options.length < 4) {
                let wrongHour, wrongMinute;
                const strategy = Math.floor(Math.random() * 5);

                switch (strategy) {
                    case 0: // 小時差 1
                        wrongHour = correctHour + 1;
                        wrongMinute = correctMinute;
                        break;
                    case 1: // 小時差 -1
                        wrongHour = correctHour - 1;
                        wrongMinute = correctMinute;
                        break;
                    case 2: // 分鐘差 ±5
                        wrongHour = correctHour;
                        wrongMinute = correctMinute + (Math.random() < 0.5 ? 5 : -5);
                        break;
                    case 3: // 分鐘差 ±10
                        wrongHour = correctHour;
                        wrongMinute = correctMinute + (Math.random() < 0.5 ? 10 : -10);
                        break;
                    case 4: // 小時差 ±1 且分鐘微調
                        wrongHour = correctHour + (Math.random() < 0.5 ? 1 : -1);
                        wrongMinute = correctMinute + (Math.random() < 0.5 ? 5 : -5);
                        break;
                }

                // 確保小時在 1-12 範圍內
                if (wrongHour < 1) wrongHour += 12;
                if (wrongHour > 12) wrongHour -= 12;

                // 確保分鐘在 0-59 範圍內，且為 5 的倍數
                wrongMinute = Math.round(wrongMinute / 5) * 5;
                if (wrongMinute < 0) wrongMinute += 60;
                if (wrongMinute >= 60) wrongMinute -= 60;

                const wrongAnswer = `${wrongHour}:${wrongMinute.toString().padStart(2, '0')}`;

                if (!options.includes(wrongAnswer)) {
                    options.push(wrongAnswer);
                }
            }

            shuffleArray(options);

            options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option';
                button.textContent = option;
                button.addEventListener('click', () => checkAnswer(option));
                optionsContainer.appendChild(button);
            });
        }

        function generateDifferenceOptions(correctHours, correctMinutes, totalMinutes) {
            optionsContainer.innerHTML = '';
            const options = [correctAnswer];

            // 生成錯誤選項，確保合理且接近
            while (options.length < 4) {
                let wrongAnswer;
                const strategy = Math.floor(Math.random() * 5);

                switch (strategy) {
                    case 0: // 小時差 ±1
                        const wrongHours1 = correctHours + 1;
                        wrongAnswer = wrongHours1 === 0 ? `${correctMinutes} minutes` : `${wrongHours1} hour${wrongHours1 > 1 ? 's' : ''} ${correctMinutes} minutes`;
                        break;
                    case 1: // 小時差 -1（如果可能）
                        const wrongHours2 = Math.max(0, correctHours - 1);
                        wrongAnswer = wrongHours2 === 0 ? `${correctMinutes} minutes` : `${wrongHours2} hour${wrongHours2 > 1 ? 's' : ''} ${correctMinutes} minutes`;
                        break;
                    case 2: // 分鐘差 +15
                        const wrongMinutes1 = correctMinutes + 15;
                        wrongAnswer = correctHours === 0 ? `${wrongMinutes1} minutes` : `${correctHours} hour${correctHours > 1 ? 's' : ''} ${wrongMinutes1} minutes`;
                        break;
                    case 3: // 分鐘差 -15（如果可能）
                        const wrongMinutes2 = Math.max(0, correctMinutes - 15);
                        wrongAnswer = correctHours === 0 ? `${wrongMinutes2} minutes` : `${correctHours} hour${correctHours > 1 ? 's' : ''} ${wrongMinutes2} minutes`;
                        break;
                    case 4: // 小時和分鐘都微調
                        const wh = Math.max(0, correctHours + (Math.random() < 0.5 ? 1 : -1));
                        const wm = correctMinutes + (Math.random() < 0.5 ? 5 : -5);
                        wrongAnswer = wh === 0 ? `${wm} minutes` : `${wh} hour${wh > 1 ? 's' : ''} ${wm} minutes`;
                        break;
                }

                // 檢查分鐘是否為負數
                const minuteMatch = wrongAnswer.match(/(\d+) minutes?/);
                if (minuteMatch && parseInt(minuteMatch[1]) < 0) continue;

                if (!options.includes(wrongAnswer)) {
                    options.push(wrongAnswer);
                }
            }

            shuffleArray(options);

            options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option';
                button.textContent = option;
                button.addEventListener('click', () => checkAnswer(option));
                optionsContainer.appendChild(button);
            });
        }

        function checkAnswer(selectedAnswer) {
            // 禁用所有選項以防止多次點擊
            const options = document.querySelectorAll('.option');
            options.forEach(option => {
                option.disabled = true;
            });

            const isCorrect = selectedAnswer === correctAnswer;
            
            // 記錄問題歷史
            const questionType = questionTypeBadge.textContent.includes('Type 1') ? 1 : 2;
            questionHistory.push({
                questionType: questionType,
                questionText: questionText.textContent,
                timeInfo: timeInfo.innerHTML,
                clockHTML: clockContainer.innerHTML,
                correctAnswer: correctAnswer,
                selectedAnswer: selectedAnswer,
                isCorrect: isCorrect
            });

            if (isCorrect) {
                feedbackElement.textContent = 'Correct! Well done! ✨';
                feedbackElement.className = 'feedback correct';
                score++;
                scoreElement.textContent = score;

                // 高亮正確答案
                options.forEach(option => {
                    if (option.textContent === correctAnswer) {
                        option.classList.add('correct-answer');
                    }
                });
            } else {
                feedbackElement.textContent = `Incorrect. The correct answer is: ${correctAnswer}`;
                feedbackElement.className = 'feedback incorrect';

                // 高亮正確答案並標記錯誤答案
                options.forEach(option => {
                    if (option.textContent === correctAnswer) {
                        option.classList.add('correct-answer');
                    } else if (option.textContent === selectedAnswer) {
                        option.classList.add('incorrect');
                    }
                });
            }

            // 3秒後進入下一題
            timer = setTimeout(() => {
                currentQuestionNum++;
                generateNewQuestion();
            }, 3000);
        }

        function showReview() {
            // 隱藏遊戲元素
            gameArea.style.display = 'none';
            feedbackElement.textContent = '';

            // 顯示複習容器
            reviewContainer.style.display = 'block';
            playAgainSection.style.display = 'block';
            questionDetail.classList.remove('show');

            // 清除之前的複習
            reviewSummary.innerHTML = '';
            reviewButtons.innerHTML = '';

            // 計算總結
            const correctCount = questionHistory.filter(q => q.isCorrect).length;
            const summaryHtml = `
                <div style="text-align: center; padding: 20px; background: linear-gradient(145deg, #fff9e6, #fff5cc); border-radius: 15px; margin-bottom: 20px;">
                    <h3 style="color: #2a9d8f; margin: 10px 0;">🎉 Round Complete!</h3>
                    <p style="font-size: 1.3rem; margin: 10px 0;">
                        Score: <strong>${correctCount}</strong> / ${QUESTIONS_PER_ROUND}
                    </p>
                    <p style="color: #666;">
                        ${correctCount === QUESTIONS_PER_ROUND ? 'Perfect score! 🌟' :
                          correctCount >= 8 ? 'Great job! 👍' :
                          correctCount >= 6 ? 'Good effort! Keep practicing! 💪' :
                          'Keep trying! You\'ll get better! 📚'}
                    </p>
                    <p style="font-size: 1rem; color: #999; margin-top: 10px;">Click a number to review that question</p>
                </div>
            `;
            reviewSummary.innerHTML = summaryHtml;

            // 生成複習按鈕
            questionHistory.forEach((question, index) => {
                const button = document.createElement('button');
                const type = question.questionType === 1 ? '⭐' : '⏱️';
                button.className = `review-btn ${question.isCorrect ? 'correct' : 'incorrect'}`;
                button.textContent = `${type} ${index + 1}`;
                button.title = question.isCorrect ? 'Correct' : 'Incorrect';
                button.addEventListener('click', () => showQuestionDetail(index));
                reviewButtons.appendChild(button);
            });

            // Scroll to review section
            reviewContainer.scrollIntoView({ behavior: 'smooth' });
        }

        function showQuestionDetail(index) {
            const question = questionHistory[index];

            // 隱藏按鈕，顯示詳情
            reviewButtons.style.display = 'none';
            playAgainSection.style.display = 'none';
            questionDetail.classList.add('show');

            const icon = question.questionType === 1 ? '⭐' : '⏱️';
            const typeName = question.questionType === 1 ? 'Future Time' : 'Time Difference';

            questionDetail.innerHTML = `
                <h3 style="color: #ff6b6b; margin-bottom: 10px;">Question ${index + 1} - ${icon} ${typeName}</h3>
                <p style="color: #666; margin-bottom: 15px;">
                    ${question.isCorrect ? '✅ Correct' : '❌ Incorrect'}
                </p>

                <div style="background: #f8f9fa; padding: 15px; border-radius: 10px; margin: 15px 0;">
                    <p style="font-size: 1.1rem; margin: 10px 0; color: #333;">
                        <strong>Question:</strong> ${question.questionText}
                    </p>
                    <p style="font-size: 1.1rem; margin: 10px 0; color: #666;">
                        ${question.timeInfo}
                    </p>
                </div>

                <div style="margin: 15px 0; display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap;">
                    ${question.clockHTML}
                </div>

                <div style="margin-top: 20px; padding: 15px; background: ${question.isCorrect ? '#e8f8f7' : '#ffe8e8'}; border-radius: 10px;">
                    <p style="font-size: 1.1rem; margin: 5px 0;">
                        <strong>Your answer:</strong> ${question.selectedAnswer}
                    </p>
                    ${!question.isCorrect ? `
                        <p style="font-size: 1.1rem; margin: 5px 0; color: #ff6b6b;">
                            <strong>Correct answer:</strong> ${question.correctAnswer}
                        </p>
                    ` : `
                        <p style="font-size: 1.1rem; margin: 5px 0; color: #4ecdc4;">
                            <strong>Well done!</strong> 🌟
                        </p>
                    `}
                </div>

                <div style="text-align: center;">
                    <button class="btn btn-home" onclick="backToReviewButtons()">← Back to Review</button>
                </div>
            `;

            // Scroll to detail
            questionDetail.scrollIntoView({ behavior: 'smooth' });
        }

        function backToReviewButtons() {
            questionDetail.classList.remove('show');
            reviewButtons.style.display = 'grid';
            playAgainSection.style.display = 'block';
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
    </script>
</body>
</html>
