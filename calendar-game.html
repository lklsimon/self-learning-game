<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Learning Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: 'Comic Neue', cursive, Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 5px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }
        * {
            box-sizing: border-box;
        }
        h1 {
            font-size: clamp(1.2rem, 4vw, 2rem);
            color: #ff6b6b;
            text-shadow: 2px 2px 0 #ffd166;
            margin: 5px 0 8px 0;
            letter-spacing: 1px;
            word-wrap: break-word;
            flex-shrink: 0;
        }
        .question-type-badge {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: white;
            font-weight: bold;
            padding: 6px 15px;
            border-radius: 20px;
            margin: 5px;
            display: inline-block;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        .question-type-badge.type1 {
            background: linear-gradient(145deg, #ff6b6b, #ff5252);
        }
        .question-type-badge.type2 {
            background: linear-gradient(145deg, #4ecdc4, #36b7ae);
        }
        .calendar-container {
            margin: 8px auto;
            flex-shrink: 0;
        }
        .calendar {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            max-width: min(450px, 90vw);
            margin: 0 auto;
        }
        .calendar-header {
            background: linear-gradient(145deg, #ff9a76, #ff8a61);
            color: white;
            padding: clamp(10px, 2.5vw, 15px);
            font-size: clamp(1.3rem, 4vw, 1.6rem);
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            padding: 10px;
            gap: 5px;
        }
        .calendar-day-header {
            font-size: clamp(0.8rem, 2.2vw, 0.9rem);
            font-weight: bold;
            color: #666;
            padding: 5px;
            text-align: center;
        }
        .calendar-day {
            padding: clamp(8px, 2vw, 10px);
            text-align: center;
            font-size: clamp(1rem, 2.8vw, 1.2rem);
            font-weight: bold;
            border-radius: 8px;
            color: #333;
            background: #f8f9fa;
        }
        .calendar-day.empty {
            background: transparent;
        }
        .calendar-day.weekend {
            color: #ff6b6b;
        }
        .calendar-day.highlight {
            background: linear-gradient(145deg, #ffd166, #ffc145);
            color: #333;
        }
        .question-text {
            font-size: clamp(1.2rem, 3.8vw, 1.5rem);
            color: #333;
            margin: 8px 0;
            line-height: 1.4;
            font-weight: 600;
            padding: 10px 15px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 10px auto;
            max-width: 600px;
            padding: 0 5px;
            flex-shrink: 0;
        }
        .option {
            padding: clamp(12px, 3.5vw, 16px) clamp(16px, 4.5vw, 22px);
            background: linear-gradient(145deg, #a8e6cf, #8dd7b9);
            color: #333;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: clamp(1rem, 3.2vw, 1.2rem);
            flex: 1 0 45%;
            min-width: min(160px, 40vw);
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 0 #6bc5a3;
        }
        .option:hover:not(:disabled) {
            background: linear-gradient(145deg, #8dd7b9, #7bc9a9);
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #6bc5a3;
        }
        .option:disabled {
            cursor: not-allowed;
        }
        .option.incorrect {
            background: linear-gradient(145deg, #ff8ba0, #ff6b6b);
            box-shadow: 0 4px 0 #e05555;
        }
        .option.correct-answer {
            background: linear-gradient(145deg, #4ecdc4, #36b7ae);
            box-shadow: 0 0 15px #4ecdc4;
            animation: pulse 1s infinite;
        }
        .feedback {
            font-size: clamp(1.1rem, 3.5vw, 1.4rem);
            margin: 8px;
            min-height: 35px;
            font-weight: bold;
            padding: 0 10px;
            flex-shrink: 0;
        }
        .correct {
            color: #4ecdc4;
            text-shadow: 1px 1px 0 #2a9d8f;
        }
        .incorrect {
            color: #ff6b6b;
            text-shadow: 1px 1px 0 #e63946;
        }
        .score-display {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            margin: 4px 8px;
            padding: clamp(5px, 1.5vw, 8px) clamp(12px, 3vw, 15px);
            background: linear-gradient(145deg, #ffd166, #ffc145);
            border-radius: 15px;
            display: inline-block;
            color: #333;
            font-weight: bold;
            box-shadow: 0 3px 0 #e0b14d;
            flex-shrink: 0;
        }
        .progress-display {
            font-size: clamp(0.85rem, 2.8vw, 1.1rem);
            margin: 4px 8px;
            padding: clamp(5px, 1.5vw, 8px) clamp(12px, 3vw, 15px);
            background: linear-gradient(145deg, #a8e6cf, #8dd7b9);
            border-radius: 15px;
            display: inline-block;
            color: #333;
            font-weight: bold;
            box-shadow: 0 3px 0 #6bc5a3;
            flex-shrink: 0;
        }
        .stats-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
            flex-shrink: 0;
        }
        .review-container {
            display: none;
            margin: 15px auto;
            max-width: 95vw;
            background: white;
            padding: clamp(15px, 4vw, 20px);
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .review-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: clamp(8px, 2vw, 10px);
            margin: 15px 0;
            padding: clamp(15px, 4vw, 20px);
            background: #f8f9fa;
            border-radius: 15px;
        }
        .review-btn {
            padding: clamp(10px, 3vw, 15px);
            background: linear-gradient(145deg, #a8e6cf, #8dd7b9);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            font-weight: bold;
            color: #333;
            transition: all 0.3s ease;
            box-shadow: 0 3px 0 #6bc5a3;
        }
        .review-btn:hover {
            background: linear-gradient(145deg, #8dd7b9, #7bc9a9);
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #6bc5a3;
        }
        .review-btn.correct {
            background: linear-gradient(145deg, #4ecdc4, #36b7ae);
            box-shadow: 0 3px 0 #2a9d8f;
        }
        .review-btn.correct:hover {
            background: linear-gradient(145deg, #36b7ae, #2a9d8f);
            box-shadow: 0 5px 0 #2a9d8f;
        }
        .review-btn.incorrect {
            background: linear-gradient(145deg, #ff8ba0, #ff6b6b);
            box-shadow: 0 3px 0 #e05555;
        }
        .review-btn.incorrect:hover {
            background: linear-gradient(145deg, #ff6b6b, #e05555);
            box-shadow: 0 5px 0 #e05555;
        }
        .question-detail {
            display: none;
            margin-top: 15px;
            padding: clamp(15px, 4vw, 20px);
            background: linear-gradient(145deg, #fff9e6, #fff5cc);
            border-radius: 15px;
            border: 3px solid #ffd166;
        }
        .question-detail.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes pulse {
            0% {
                box-shadow: 0 0 5px #4ecdc4, 0 4px 0 #36b7ae;
                transform: translateY(-1px);
            }
            50% {
                box-shadow: 0 0 20px #4ecdc4, 0 6px 0 #36b7ae;
                transform: translateY(-3px);
            }
            100% {
                box-shadow: 0 0 5px #4ecdc4, 0 4px 0 #36b7ae;
                transform: translateY(-1px);
            }
        }
        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .btn {
            padding: clamp(15px, 4vw, 20px) clamp(30px, 8vw, 45px);
            background: linear-gradient(145deg, #4ecdc4, #36b7ae);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: clamp(1.1rem, 3.5vw, 1.4rem);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 0 #2a9d8f;
        }
        .btn:hover {
            background: linear-gradient(145deg, #36b7ae, #2a9d8f);
            box-shadow: 0 8px 0 #2a9d8f;
            transform: translateY(-3px);
        }
        .btn-home {
            background: linear-gradient(145deg, #ff9a76, #ff8a61);
            box-shadow: 0 5px 0 #e07a4f;
        }
        .btn-home:hover {
            background: linear-gradient(145deg, #ff8a61, #ff7a4c);
            box-shadow: 0 8px 0 #e07a4f;
        }
        @media (max-width: 600px) {
            .calendar-grid {
                gap: 3px;
            }
            .calendar-day {
                padding: 6px;
                font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            }
        }
    </style>
</head>
<body>
    <h1>📅 Calendar Learning Game</h1>
    <div class="stats-container">
        <div class="score-display">Score: <span id="score">0</span></div>
        <div class="progress-display">Question: <span id="currentQuestion">1</span>/10</div>
    </div>

    <div id="gameArea">
        <div class="question-type-badge" id="questionTypeBadge"></div>
        <div class="calendar-container">
            <div class="calendar">
                <div class="calendar-header" id="calendarHeader"></div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
        </div>
        <div class="question-text" id="questionText"></div>
        <div class="options" id="options"></div>
        <div class="feedback" id="feedback"></div>
    </div>

    <div class="review-container" id="reviewContainer">
        <h2 style="color: #ff6b6b; margin-bottom: 20px;">📊 Review Your Answers</h2>
        <div id="reviewSummary"></div>
        <div id="reviewButtons" class="review-buttons"></div>
        <div id="questionDetail" class="question-detail"></div>
        <div id="playAgainSection" style="display: none; text-align: center;">
            <button class="btn" id="playAgainBtn" style="margin-right: 10px;">🎮 Play Again</button>
            <button class="btn btn-home" id="homeBtn">🏠 Home</button>
        </div>
    </div>

    <script>
        const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June',
                       'July', 'August', 'September', 'October', 'November', 'December'];
        const DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const DAYS_IN_MONTH = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];

        let currentYear = new Date().getFullYear();
        let currentMonth = 0;
        let calendarData = [];
        let correctAnswer = '';
        let score = 0;
        let timer = null;
        let questionHistory = [];
        let currentQuestionNum = 1;
        const QUESTIONS_PER_ROUND = 10;

        const questionTypeBadge = document.getElementById('questionTypeBadge');
        const calendarHeader = document.getElementById('calendarHeader');
        const calendarGrid = document.getElementById('calendarGrid');
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('options');
        const feedbackElement = document.getElementById('feedback');
        const scoreElement = document.getElementById('score');
        const currentQuestionElement = document.getElementById('currentQuestion');
        const gameArea = document.getElementById('gameArea');
        const reviewContainer = document.getElementById('reviewContainer');
        const reviewSummary = document.getElementById('reviewSummary');
        const reviewButtons = document.getElementById('reviewButtons');
        const questionDetail = document.getElementById('questionDetail');
        const playAgainBtn = document.getElementById('playAgainBtn');
        const playAgainSection = document.getElementById('playAgainSection');

        startNewRound();

        playAgainBtn.addEventListener('click', startNewRound);
        document.getElementById('homeBtn').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        function startNewRound() {
            score = 0;
            currentQuestionNum = 1;
            questionHistory = [];

            scoreElement.textContent = score;
            currentQuestionElement.textContent = currentQuestionNum;

            gameArea.style.display = 'block';
            reviewContainer.style.display = 'none';
            playAgainSection.style.display = 'none';

            generateNewQuestion();
        }

        function generateNewQuestion() {
            if (currentQuestionNum > QUESTIONS_PER_ROUND) {
                showReview();
                return;
            }

            currentQuestionElement.textContent = currentQuestionNum;

            if (timer) {
                clearTimeout(timer);
                timer = null;
            }

            feedbackElement.textContent = '';
            feedbackElement.className = 'feedback';

            const options = document.querySelectorAll('.option');
            options.forEach(option => {
                option.classList.remove('correct-answer', 'incorrect');
                if (option.disabled) {
                    option.disabled = false;
                    option.style.background = 'linear-gradient(145deg, #a8e6cf, #8dd7b9)';
                    option.style.boxShadow = '0 4px 0 #6bc5a3';
                }
            });

            generateCalendar();

            const questionType = Math.random() < 0.5 ? 1 : 2;

            if (questionType === 1) {
                generateWeekDateQuestion();
            } else {
                generateFutureDateQuestion();
            }
        }

        function generateCalendar() {
            currentMonth = Math.floor(Math.random() * 12);
            const daysInMonth = DAYS_IN_MONTH[currentMonth];

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();

            calendarData = [];
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(currentYear, currentMonth, day);
                const dayOfWeek = date.getDay();
                calendarData.push({
                    day: day,
                    dayOfWeek: dayOfWeek,
                    weekNumber: Math.ceil((day + firstDay) / 7)
                });
            }

            calendarHeader.textContent = `${MONTHS[currentMonth]} ${currentYear}`;

            let gridHTML = '';
            DAYS.forEach(day => {
                gridHTML += `<div class="calendar-day-header">${day}</div>`;
            });

            for (let i = 0; i < firstDay; i++) {
                gridHTML += `<div class="calendar-day empty"></div>`;
            }

            calendarData.forEach(date => {
                const isWeekend = date.dayOfWeek === 0 || date.dayOfWeek === 6;
                gridHTML += `<div class="calendar-day ${isWeekend ? 'weekend' : ''}">${date.day}</div>`;
            });

            calendarGrid.innerHTML = gridHTML;
        }

        function generateWeekDateQuestion() {
            questionTypeBadge.textContent = '⭐ Type 1: Week Date';
            questionTypeBadge.className = 'question-type-badge type1';

            const weekNumber = Math.floor(Math.random() * 4) + 1; // 1-4
            const targetDayOfWeek = Math.floor(Math.random() * 7); // 0-6

            const targetDate = calendarData.find(date =>
                date.weekNumber === weekNumber && date.dayOfWeek === targetDayOfWeek
            );

            if (!targetDate) {
                generateNewQuestion();
                return;
            }

            correctAnswer = `${MONTHS[currentMonth]} ${targetDate.day}`;

            questionText.textContent = `What is the date of the ${weekNumber}${getOrdinal(weekNumber)} ${DAYS[targetDayOfWeek]} in ${MONTHS[currentMonth]}?`;

            generateDateOptions(targetDate.day);
        }

        function generateFutureDateQuestion() {
            questionTypeBadge.textContent = '⏱️ Type 2: Future Date';
            questionTypeBadge.className = 'question-type-badge type2';

            const startDay = Math.floor(Math.random() * 20) + 1; // 1-20
            const daysToAdd = Math.floor(Math.random() * 10) + 3; // 3-12

            const targetDate = startDay + daysToAdd;
            const daysInMonth = DAYS_IN_MONTH[currentMonth];

            if (targetDate > daysInMonth) {
                generateNewQuestion();
                return;
            }

            correctAnswer = `${MONTHS[currentMonth]} ${targetDate}`;

            questionText.textContent = `If today is ${MONTHS[currentMonth]} ${startDay}, what will the date be after ${daysToAdd} days?`;

            generateDateOptions(targetDate);
        }

        function generateDateOptions(correctDay) {
            optionsContainer.innerHTML = '';
            const options = [correctAnswer];

            while (options.length < 4) {
                let wrongDay = correctDay + Math.floor(Math.random() * 5) - 2;
                wrongDay = Math.max(1, Math.min(DAYS_IN_MONTH[currentMonth], wrongDay));

                const wrongAnswer = `${MONTHS[currentMonth]} ${wrongDay}`;

                if (!options.includes(wrongAnswer)) {
                    options.push(wrongAnswer);
                }
            }

            shuffleArray(options);

            options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option';
                button.textContent = option;
                button.addEventListener('click', () => checkAnswer(option));
                optionsContainer.appendChild(button);
            });
        }

        function getOrdinal(n) {
            const s = ['th', 'st', 'nd', 'rd'];
            const v = n % 100;
            return s[(v - 20) % 10] || s[v] || s[0];
        }

        function checkAnswer(selectedAnswer) {
            const options = document.querySelectorAll('.option');
            options.forEach(option => {
                option.disabled = true;
            });

            const isCorrect = selectedAnswer === correctAnswer;

            const questionType = questionTypeBadge.textContent.includes('Type 1') ? 1 : 2;
            questionHistory.push({
                questionType: questionType,
                questionText: questionText.textContent,
                correctAnswer: correctAnswer,
                selectedAnswer: selectedAnswer,
                isCorrect: isCorrect,
                month: MONTHS[currentMonth],
                year: currentYear
            });

            if (isCorrect) {
                feedbackElement.textContent = 'Correct! Well done! ✨';
                feedbackElement.className = 'feedback correct';
                score++;
                scoreElement.textContent = score;

                options.forEach(option => {
                    if (option.textContent === correctAnswer) {
                        option.classList.add('correct-answer');
                    }
                });
            } else {
                feedbackElement.textContent = `Incorrect. The correct answer is: ${correctAnswer}`;
                feedbackElement.className = 'feedback incorrect';

                options.forEach(option => {
                    if (option.textContent === correctAnswer) {
                        option.classList.add('correct-answer');
                    } else if (option.textContent === selectedAnswer) {
                        option.classList.add('incorrect');
                    }
                });
            }

            timer = setTimeout(() => {
                currentQuestionNum++;
                generateNewQuestion();
            }, 3000);
        }

        function showReview() {
            gameArea.style.display = 'none';
            feedbackElement.textContent = '';

            reviewContainer.style.display = 'block';
            playAgainSection.style.display = 'block';
            questionDetail.classList.remove('show');

            reviewSummary.innerHTML = '';
            reviewButtons.innerHTML = '';

            const correctCount = questionHistory.filter(q => q.isCorrect).length;
            const summaryHtml = `
                <div style="text-align: center; padding: 20px; background: linear-gradient(145deg, #fff9e6, #fff5cc); border-radius: 15px; margin-bottom: 20px;">
                    <h3 style="color: #2a9d8f; margin: 10px 0;">🎉 Round Complete!</h3>
                    <p style="font-size: 1.3rem; margin: 10px 0;">
                        Score: <strong>${correctCount}</strong> / ${QUESTIONS_PER_ROUND}
                    </p>
                    <p style="color: #666;">
                        ${correctCount === QUESTIONS_PER_ROUND ? 'Perfect score! 🌟' :
                          correctCount >= 8 ? 'Great job! 👍' :
                          correctCount >= 6 ? 'Good effort! Keep practicing! 💪' :
                          'Keep trying! You\'ll get better! 📚'}
                    </p>
                    <p style="font-size: 1rem; color: #999; margin-top: 10px;">Click a number to review that question</p>
                </div>
            `;
            reviewSummary.innerHTML = summaryHtml;

            questionHistory.forEach((question, index) => {
                const button = document.createElement('button');
                const type = question.questionType === 1 ? '⭐' : '⏱️';
                button.className = `review-btn ${question.isCorrect ? 'correct' : 'incorrect'}`;
                button.textContent = `${type} ${index + 1}`;
                button.title = question.isCorrect ? 'Correct' : 'Incorrect';
                button.addEventListener('click', () => showQuestionDetail(index));
                reviewButtons.appendChild(button);
            });

            reviewContainer.scrollIntoView({ behavior: 'smooth' });
        }

        function showQuestionDetail(index) {
            const question = questionHistory[index];

            reviewButtons.style.display = 'none';
            playAgainSection.style.display = 'none';
            questionDetail.classList.add('show');

            const icon = question.questionType === 1 ? '⭐' : '⏱️';
            const typeName = question.questionType === 1 ? 'Week Date' : 'Future Date';

            questionDetail.innerHTML = `
                <h3 style="color: #ff6b6b; margin-bottom: 10px;">Question ${index + 1} - ${icon} ${typeName}</h3>
                <p style="color: #666; margin-bottom: 15px;">
                    ${question.isCorrect ? '✅ Correct' : '❌ Incorrect'}
                </p>

                <div style="background: #f8f9fa; padding: 15px; border-radius: 10px; margin: 15px 0;">
                    <p style="font-size: 1.1rem; margin: 10px 0; color: #333;">
                        <strong>Question:</strong> ${question.questionText}
                    </p>
                    <p style="font-size: 1rem; margin: 10px 0; color: #666;">
                        <strong>Calendar:</strong> ${question.month} ${question.year}
                    </p>
                </div>

                <div style="margin-top: 20px; padding: 15px; background: ${question.isCorrect ? '#e8f8f7' : '#ffe8e8'}; border-radius: 10px;">
                    <p style="font-size: 1.1rem; margin: 5px 0;">
                        <strong>Your answer:</strong> ${question.selectedAnswer}
                    </p>
                    ${!question.isCorrect ? `
                        <p style="font-size: 1.1rem; margin: 5px 0; color: #ff6b6b;">
                            <strong>Correct answer:</strong> ${question.correctAnswer}
                        </p>
                    ` : `
                        <p style="font-size: 1.1rem; margin: 5px 0; color: #4ecdc4;">
                            <strong>Well done!</strong> 🌟
                        </p>
                    `}
                </div>

                <div style="text-align: center;">
                    <button class="btn btn-home" onclick="backToReviewButtons()">← Back to Review</button>
                </div>
            `;

            questionDetail.scrollIntoView({ behavior: 'smooth' });
        }

        function backToReviewButtons() {
            questionDetail.classList.remove('show');
            reviewButtons.style.display = 'grid';
            playAgainSection.style.display = 'block';
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
    </script>
</body>
</html>
